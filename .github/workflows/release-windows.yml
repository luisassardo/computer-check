name: Release (Windows)

# Builds the Windows ComputerCheck app: bundles the engine as a .exe, builds the
# Tauri NSIS + MSI installers, optionally Authenticode-signs them, and uploads.
#
# Required repo secrets for signing (optional — without them the build still runs
# and produces UNSIGNED installers that hit SmartScreen):
#   WINDOWS_CERTIFICATE           base64 of your code-signing .pfx
#   WINDOWS_CERTIFICATE_PASSWORD  the .pfx password
#
# Trigger: a version tag push (v*) or manually from the Actions tab.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine build deps
        run: pip install pyinstaller fpdf2

      - name: Build engine (.exe)
        run: powershell -ExecutionPolicy Bypass -File scripts/build-engine.ps1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm install

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Build Tauri app (NSIS + MSI)
        run: npm run tauri build -- --config src-tauri/tauri.release.conf.json

      - name: Sign installers (if a certificate secret is present)
        if: ${{ env.WINDOWS_CERTIFICATE != '' }}
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $pfx = "$env:RUNNER_TEMP\clab-cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          # signtool ships with the Windows SDK on the runner.
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                       Sort-Object FullName -Descending | Select-Object -First 1).FullName
          $targets = Get-ChildItem -Recurse `
            src-tauri/target/release/bundle/nsis/*.exe,
            src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue
          foreach ($t in $targets) {
            & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
              /f $pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD $t.FullName
          }
          Remove-Item $pfx -Force

      - name: Compute checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse `
            src-tauri/target/release/bundle/nsis/*.exe,
            src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue
          $files | Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash, (Split-Path $_.Path -Leaf) } |
            Out-File SHA256SUMS-windows.txt -Encoding utf8
          Get-Content SHA256SUMS-windows.txt

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ComputerCheck-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            SHA256SUMS-windows.txt
