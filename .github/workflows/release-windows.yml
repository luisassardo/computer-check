name: Release (Windows)

# Builds the Windows ComputerCheck app: bundles the engine as a .exe, builds the
# Tauri NSIS + MSI installers, optionally Authenticode-signs them, and uploads.
#
# Code signing uses SSL.com eSigner (cloud, headless — no .pfx, no USB token).
# Set these repo secrets ONCE (optional — without them the build still runs and
# produces UNSIGNED installers that hit SmartScreen):
#   ES_USERNAME       SSL.com account username
#   ES_PASSWORD       SSL.com account password
#   ES_CREDENTIAL_ID  eSigner credential / certificate ID
#   ES_TOTP_SECRET    eSigner TOTP secret (lets the runner generate the OTP)
#
# Trigger: a version tag push (v*) or manually from the Actions tab.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # Exposed at job level so the signing steps can self-skip until the cert is set up.
      ES_USERNAME: ${{ secrets.ES_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine build deps
        run: pip install pyinstaller fpdf2

      - name: Build engine (.exe)
        run: powershell -ExecutionPolicy Bypass -File scripts/build-engine.ps1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm install

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Build Tauri app (NSIS + MSI)
        run: npm run tauri build -- --config src-tauri/tauri.release.conf.json

      # --- Code signing via SSL.com eSigner (cloud, headless) ----------------
      # Skips automatically until the ES_* secrets exist. override:true signs the
      # files in place so the checksum/upload steps pick up the signed binaries.
      # Only the file hash is sent to SSL.com, never the binary itself.
      - name: Locate installers
        id: bundle
        shell: pwsh
        run: |
          $nsis = (Get-ChildItem -Recurse src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1).FullName
          $msi  = (Get-ChildItem -Recurse src-tauri/target/release/bundle/msi/*.msi  | Select-Object -First 1).FullName
          "nsis=$nsis" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "msi=$msi"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Sign NSIS installer (eSigner)
        if: ${{ env.ES_USERNAME != '' }}
        uses: sslcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ steps.bundle.outputs.nsis }}
          override: true
          malware_block: false
          clean_logs: true
          environment_name: PROD

      - name: Sign MSI installer (eSigner)
        if: ${{ env.ES_USERNAME != '' }}
        uses: sslcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: ${{ steps.bundle.outputs.msi }}
          override: true
          malware_block: false
          clean_logs: true
          environment_name: PROD

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: ComputerCheck.sbom.cdx.json
          upload-artifact: false

      - name: Compute checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse `
            src-tauri/target/release/bundle/nsis/*.exe,
            src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue
          $files | Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash, (Split-Path $_.Path -Leaf) } |
            Out-File SHA256SUMS-windows.txt -Encoding utf8
          Get-Content SHA256SUMS-windows.txt

      - name: Upload installers (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ComputerCheck-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            SHA256SUMS-windows.txt
            ComputerCheck.sbom.cdx.json

      - name: Publish to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $nsis = Get-ChildItem -Recurse src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          # stable name the landing button links to
          Copy-Item $nsis.FullName ComputerCheck-Windows-Setup.exe -Force
          $assets = @("ComputerCheck-Windows-Setup.exe", "SHA256SUMS-windows.txt", "ComputerCheck.sbom.cdx.json")
          $tag = $env:GITHUB_REF_NAME
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag --title "ComputerCheck $tag" `
              --notes "macOS (Apple-notarized) + Windows installers. Verify against SHA256SUMS before opening." $assets
          }
